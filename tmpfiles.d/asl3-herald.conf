# asl3-herald: recreates the Hourly Time & Weather temp directory on every
# boot, before Asterisk (or anything else) starts. /run is a tmpfs, wiped on
# every reboot/power loss - this file is what makes sure the directory
# reliably exists again immediately, rather than relying on whichever
# process happens to call build_timeweather_audio() first (which can't
# create it themselves if that first caller is the unprivileged `asterisk`
# user via a DTMF-triggered test-timeweather call - only root can create new
# entries directly under /run).
#
# Type Path                                    Mode UID  GID  Age Argument
d      /run/asl3-herald                        0755 root root -
d      /run/asl3-herald/timeweather-tmp        1777 root root -
